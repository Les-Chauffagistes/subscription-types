openapi: 3.0.3

info:
  title: Subscription API
  version: 1.0.0

components:
  schemas:
    SubscriptionStatus:
      type: string
      enum:
        - inactive
        - active
        - expired

    Subscription:
      type: object
      required:
        - pool_address
        - status
        - created_at
        - updated_at
      properties:
        pool_address:
          type: string

        started_at:
          type: string
          format: date-time
          nullable: true

        expires_at:
          type: string
          format: date-time
          nullable: true

        status:
          $ref: '#/components/schemas/SubscriptionStatus'

        created_at:
          type: string
          format: date-time

        updated_at:
          type: string
          format: date-time